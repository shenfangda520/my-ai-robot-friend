<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的AI机器朋友</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🤖 我的AI机器朋友</h1>
            <p>和你的AI朋友聊天吧！</p>
        </header>
        
        <div class="chat-container">
            <div class="chat-messages" id="chatMessages">
                <div class="message bot">
                    <div class="message-content">
                        <span class="bot-name">AI朋友</span>
                        <p>你好！我是你的AI机器朋友，很高兴认识你！有什么想聊的吗？</p>
                    </div>
                </div>
            </div>
            
            <div class="input-area">
                <input type="text" id="userInput" placeholder="输入你想说的话..." autocomplete="off">
                <button id="sendButton">发送</button>
            </div>
        </div>
        
        <div class="features">
            <h3>我的AI朋友能做什么：</h3>
            <ul>
                <li>💬 陪你聊天解闷</li>
                <li>💡 回答你的问题</li>
                <li>🎯 讲笑话逗你开心</li>
                <li>📚 帮你学习新知识</li>
            </ul>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
